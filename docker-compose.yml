services:
  app:
    build: 
      context: .
      dockerfile: Dockerfile.api
    restart: on-failure
    environment:
      - PORT=8080
      - DB_DSN=postgres://postgres:postgres@db:5432/brokeli?sslmode=disable
      - PROJECT_ROOT=/app
    depends_on:
      - db

  web:
    build:
      context: .
      dockerfile: Dockerfile.ui
    ports:
      - "8080:80"
    depends_on:
      - app

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=brokeli
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
